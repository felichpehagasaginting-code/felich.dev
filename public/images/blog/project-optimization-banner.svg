<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark mode gradient background -->
  <rect width="1200" height="630" fill="#0A0A0C"/>
  <circle cx="150" cy="150" r="300" fill="#3B82F6" opacity="0.1" filter="blur(80px)"/>
  <circle cx="1050" cy="480" r="300" fill="#10B981" opacity="0.1" filter="blur(80px)"/>
  <circle cx="600" cy="315" r="250" fill="#F59E0B" opacity="0.05" filter="blur(100px)"/>

  <!-- Optimization / Speed Graphic -->
  <g transform="translate(600, 180) scale(1.5)">
    <circle cx="0" cy="0" r="35" fill="#10B981" opacity="0.1"/>
    <!-- Speed Gauge -->
    <path d="M-25 10 A 28 28 0 1 1 25 10" stroke="#33333F" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M-25 10 A 28 28 0 1 1 15 -18" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Gauge needle pointing high -->
    <path d="M0 0 L16 -16" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
    <!-- Lightning bolt inside -->
    <path d="M-4 -8 L2 -8 L-1 -2 L3 -2 L-3 8 L-1 1 L-5 1 Z" fill="#3B82F6" transform="translate(-15, 20) scale(0.8)"/>
    <!-- Accessibility user icon -->
    <circle cx="15" cy="22" r="5" fill="#10B981"/>
    <path d="M5 32 C5 28, 25 28, 25 32" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Title & Subtitle inside image -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">PERFORMANCE &amp; A11Y OPTIMIZATION</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="20" fill="#888899" text-anchor="middle" letter-spacing="4">NEXT.JS TRACING &bull; SANITY API &bull; WCAG AUDIT</text>

  <!-- Glowing metrics boxes on the sides -->
  <!-- Left Side: Performance Metrics -->
  <g transform="translate(100, 200)">
    <rect width="300" height="180" rx="20" fill="#151518" stroke="#33333C" stroke-width="2"/>
    <text x="30" y="45" font-family="monospace" font-size="12" fill="#888899" letter-spacing="1">PERF METRICS</text>
    <text x="30" y="100" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="42" fill="#10B981">100%</text>
    <text x="30" y="135" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="14" fill="#888899">LCP / Next-Generation Tracing</text>
    <!-- Speed line graphic -->
    <rect x="30" y="150" width="240" height="4" rx="2" fill="#222227"/>
    <rect x="30" y="150" width="240" height="4" rx="2" fill="#10B981"/>
  </g>

  <!-- Right Side: Accessibility Audit -->
  <g transform="translate(800, 200)">
    <rect width="300" height="180" rx="20" fill="#151518" stroke="#33333C" stroke-width="2"/>
    <text x="30" y="45" font-family="monospace" font-size="12" fill="#888899" letter-spacing="1">ACCESSIBILITY</text>
    <text x="30" y="100" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="42" fill="#3B82F6">A++</text>
    <text x="30" y="135" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="14" fill="#888899">WCAG Compliant / Mobile Nav</text>
    <!-- Accessibility progress visual -->
    <rect x="30" y="150" width="240" height="4" rx="2" fill="#222227"/>
    <rect x="30" y="150" width="240" height="4" rx="2" fill="#3B82F6"/>
  </g>
</svg>
